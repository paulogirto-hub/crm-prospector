services:
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: prospec-crm-php
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - ./storage/logs:/app/storage/logs
      - ./storage/sessions:/app/storage/sessions
    environment:
      - PHP_ADMIN_VALUE[session.save_path]=/app/storage/sessions
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-prospec_crm}
      - DB_USER=${DB_USER:-prospec}
      - DB_PASS=${DB_PASS:-prospec123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - APP_SECRET=${APP_SECRET:-change_me_in_production}
      - APP_ENV=${APP_ENV:-production}
      - OLLAMA_KEY=${OLLAMA_KEY:-}
      - OLLAMA_BASE=${OLLAMA_BASE:-https://ollama.com/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-glm-5.1}
      - SERPER_KEY=${SERPER_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - prospec-net

  nginx:
    image: nginx:1.25-alpine
    container_name: prospec-crm-nginx
    restart: unless-stopped
    ports:
      - "8089:443"
      - "8090:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./storage/nginx-logs:/var/log/nginx
    depends_on:
      php-fpm:
        condition: service_healthy
    networks:
      - prospec-net

  postgres:
    image: postgres:16
    container_name: prospec-crm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-prospec_crm}
      - POSTGRES_USER=${DB_USER:-prospec}
      - POSTGRES_PASSWORD=${DB_PASS:-prospec123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prospec} -d ${DB_NAME:-prospec_crm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prospec-net

  redis:
    image: redis:7-alpine
    container_name: prospec-crm-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - prospec-net

volumes:
  pgdata:
  redisdata:

networks:
  prospec-net:
    driver: bridge